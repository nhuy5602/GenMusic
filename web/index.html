<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GenMusic VN</title>
    <link rel="stylesheet" href="/web/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="GenMusic VN workspace">
        <form id="generate-form" class="input-panel">
          <div class="brand-row">
            <div>
              <h1>GenMusic VN</h1>
              <p>Local text client - Kaggle MusicGen - MP3 output</p>
            </div>
            <div class="status-pill" id="status-pill">Ready</div>
          </div>

          <label for="text">Vietnamese text</label>
          <textarea id="text" name="text" rows="12">Một chiều mưa, tôi nhớ về những con phố cũ. Có lời hứa chưa kịp nói, có ánh đèn vẫn chờ trong tim.</textarea>

          <div class="control-grid">
            <label>
              Duration
              <input id="duration" type="range" min="6" max="60" value="24" />
              <span id="duration-value">24s</span>
            </label>
            <label>
              Style
              <input id="genre" type="text" placeholder="Vietnamese lo-fi, cinematic pop..." />
            </label>
          </div>

          <button class="primary-button" type="submit">Generate MP3</button>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="visualizer">
            <canvas id="wave-canvas" width="960" height="180"></canvas>
          </div>

          <div id="audio-slot" class="audio-slot">MP3 will appear here after the Kaggle job finishes.</div>

          <article>
            <h2>Kaggle Job</h2>
            <pre id="kaggle-job"></pre>
          </article>

          <div id="downloads" class="downloads"></div>
        </section>
      </section>
    </main>
    <script src="/web/app.js"></script>
  </body>
</html>

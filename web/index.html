<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GenMusic VN</title>
    <link rel="stylesheet" href="/web/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Không gian làm việc GenMusic VN">
        <form id="generate-form" class="input-panel">
          <div class="brand-row">
            <div>
              <h1>GenMusic VN</h1>
              <p>Model tự code sinh nhạc từ văn bản - lyric/vocal là add-on - Xuất MP3</p>
            </div>
            <div class="status-pill" id="status-pill">Sẵn sàng</div>
          </div>

          <label for="text">Văn bản tiếng Việt</label>
          <textarea id="text" name="text" rows="12">Một chiều mưa, tôi nhớ về những con phố cũ. Có lời hứa chưa kịp nói, có ánh đèn vẫn chờ trong tim.</textarea>

          <div class="control-grid">
            <label>
              Thời lượng mục tiêu
              <input id="duration" type="range" min="6" max="60" value="24" />
              <span id="duration-value">Mục tiêu 24 giây</span>
            </label>
            <label>
              Phong cách
              <input id="genre" type="text" placeholder="lo-fi Việt Nam, pop điện ảnh..." />
            </label>
          </div>

          <button id="generate-button" class="primary-button" type="submit" aria-busy="false">
            <span class="button-text">Tạo MP3</span>
            <span class="button-loader" aria-hidden="true"></span>
          </button>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="visualizer">
            <canvas id="wave-canvas" width="960" height="180"></canvas>
          </div>

          <div id="audio-slot" class="audio-slot">MP3 sẽ xuất hiện ở đây sau khi model tự code trên Kaggle hoàn tất.</div>
          <div id="warning-slot" class="warning-slot" hidden></div>

          <article>
            <h2>Lời và vocal</h2>
            <pre id="lyrics-output">Lời bài hát và kế hoạch vocal sẽ xuất hiện ở đây sau khi model tự code trên Kaggle hoàn tất.</pre>
          </article>

          <article>
            <h2>Job Kaggle</h2>
            <pre id="kaggle-job"></pre>
          </article>

          <div id="downloads" class="downloads"></div>
        </section>
      </section>
    </main>
    <script src="/web/app.js"></script>
  </body>
</html>
